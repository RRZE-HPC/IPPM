"round" stroke-miterlimit="10" fill="#95B3D7"/><rect x="2108.5" y="1474.5" width="54" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#F2F2F2"/><rect x="2220.5" y="1476.5" width="54" height="201" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#F2F2F2"/><rect x="2305.5" y="1475.5" width="54" height="201" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#95B3D7"/><rect x="2022.5" y="1474.5" width="53.9999" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#95B3D7"/><rect x="2222.5" y="1094.5" width="403" height="323" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="27.5 9.16667" fill="#F2F2F2"/><rect x="2277.5" y="1158.5" width="294" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#95B3D7"/><text fill="#FFFFFF" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="83" transform="matrix(1 0 0 1 2413.83 1289)">j</text><rect x="1758.5" y="1094.5" width="403" height="323" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="27.5 9.16667" fill="#F2F2F2"/><rect x="1813.5" y="1158.5" width="294" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#95B3D7"/><text fill="#FFFFFF" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="83" transform="matrix(1 0 0 1 1951.02 1289)">i</text><path d="M0 0 0.000360892 201.413" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd" transform="matrix(1 0 0 -1 2053 1359.41)"/><path d="M0 0 0.000360892 201.413" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd" transform="matrix(1 0 0 -1 2334 1359.41)"/><rect x="2277.5" y="1158.5" width="294" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="none"/><rect x="1811.5" y="1158.5" width="295" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="none"/><path d="M2107 1160 2161.27 1160" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd"/><path d="M2106 1360 2160.27 1360" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd"/><path d="M0 0 54.6727 0.000360892" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2277.67 1360)"/><path d="M0 0 54.6727 0.000360892" stroke="#000000" stroke-width="10.3125" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="30.9375 10.3125" fill="none" fill-rule="evenodd" transform="matrix(-1 0 0 1 2278.67 1160)"/><text font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="55" transform="matrix(1 0 0 1 1944.55 1594)">sb<tspan font-size="55" x="433.663" y="0">sb</tspan><tspan font-size="73" x="-1868.69" y="-1155">2D domain distributed to ranks</tspan><tspan font-size="73" x="-1868.69" y="-1067">(here 4 x 3), each rank gets </tspan><tspan font-size="73" x="-1868.69" y="-979">one tile</tspan></text><rect x="99.4998" y="1377.5" width="403" height="324" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" stroke-dasharray="27.5 9.16667" fill="#F2F2F2"/><rect x="154.5" y="1441.5" width="294" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="#95B3D7"/><rect x="154.5" y="1441.5" width="294" height="202" stroke="#000000" stroke-width="9.16667" stroke-linejoin="round" stroke-miterlimit="10" fill="none"/><text font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="73" transform="matrix(1 0 0 1 77.843 1132)">Each rank’s tile is surrounded <tspan font-size="73" x="0" y="88">by </tspan><tspan fill="#00B050" font-size="73" x="98" y="88">ghost cells</tspan><tspan font-size="73" x="445" y="88">, representing the </tspan><tspan font-size="73" x="0" y="176">cells of the neighbors</tspan><tspan font-size="73" x="597.145" y="430">ghost cells</tspan></text><path d="M2.79963-4.33001 147.623 89.3073 142.023 97.9673-2.79963 4.33001ZM148.892 77.8476 166.473 107.635 132.094 103.828Z" fill="#215968" transform="matrix(-1 0 0 1 653.473 1535)"/><text font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="73" transform="matrix(1 0 0 1 1225.05 434)">After each sweep over a tile, perform <tspan fill="#00B050" font-size="73" x="0" y="88">ghost cell exchange</tspan><tspan font-size="73" x="648" y="88">, i.e., update </tspan><tspan font-size="73" x="0" y="176">ghost cells with new values of </tspan><tspan font-size="73" x="0" y="264">neighbor cells</tspan><tspan font-size="73" x="-0.264893" y="394">Possible implementation: </tspan><tspan fill="#E46C0A" font-size="50" x="-0.264893" y="460">1.</tspan><tspan fill="#E46C0A" font-size="50" x="123.735" y="460">copy new data into contiguous send buffer</tspan><tspan fill="#77933C" font-size="50" x="-0.264893" y="521">2.</tspan><tspan fill="#77933C" font-size="50" x="123.735" y="521">send to corresponding neighbor receive new data from same neighbor</tspan><tspan fill="#1F497D" font-size="50" x="-0.264893" y="581">3.</tspan><tspan fill="#1F497D" font-size="50" x="123.735" y="581">copy new data into ghost cells</tspan></text><rect x="2700" y="1139" width="504" height="233" fill="#F2F2F2"/><text fill="#002060" font-family="Courier New,Courier New_MSFontService,sans-serif" font-weight="700" font-size="64" transform="matrix(1 0 0 1 2702.37 1197)">MPI_Sendrecv<tspan font-size="64" x="460" y="0">(</tspan><tspan font-size="64" x="0" y="77">sb</tspan><tspan font-size="64" x="76" y="77">, …, </tspan><tspan font-size="64" x="268" y="77">i</tspan>, <tspan font-size="64" x="0" y="154">rb</tspan><tspan font-size="64" x="76" y="154">, …, </tspan><tspan font-size="64" x="268" y="154">i</tspan>, …)</text><rect x="1215" y="1138" width="504" height="233" fill="#F2F2F2"/><text fill="#002060" font-family="Courier New,Courier New_MSFontService,sans-serif" font-weight="700" font-size="64" transform="matrix(1 0 0 1 1217.9 1196)">MPI_Sendrecv<tspan font-size="64" x="460" y="0">(</tspan><tspan font-size="64" x="0" y="77">sb</tspan><tspan font-size="64" x="76" y="77">, …, j, </tspan><tspan font-size="64" x="0" y="154">rb</tspan><tspan font-size="64" x="76" y="154">, …, j, …)</tspan></text><path d="M2228.95 1643.23 2214.72 1645.94 2195.47 1648.81 2176.96 1650.99 2159.23 1652.48 2142.29 1653.26 2126.33 1653.36 2111.43 1652.82 2097.58 1651.55 2085.01 1649.58 2079.18 1648.38 2073.68 1646.97 2068.56 1645.4 2063.73 1643.56 2059.4 1641.63 2055.39 1639.48 2051.69 1637.02 2048.49 1634.45 2045.65 1631.54 2043.33 1628.42C2043.19 1628.22 2043.05 1628.01 2042.94 1627.8L2041.46 1624.99C2041.32 1624.72 2041.2 1624.44 2041.11 1624.15L2040.18 1621.22 2050.01 1618.1 2050.94 1621.03 2050.59 1620.18 2052.06 1622.99 2051.67 1622.36 2053.1 1624.41 2054.99 1626.44 2057.46 1628.47 2060.29 1630.41 2063.61 1632.22 2067.42 1633.93 2071.59 1635.54 2076.27 1636.98 2081.27 1638.28 2086.62 1639.39 2098.53 1641.28 2111.81 1642.51 2126.27 1643.05 2141.81 1642.96 2158.37 1642.2 2175.75 1640.75 2193.96 1638.61 2212.79 1635.81 2227.02 1633.1ZM2219.84 1624.03 2253.25 1633.02 2226.01 1654.35Z" fill="#77933C"/><path d="M225.403-4.50386 239.818-3.96515 259.153-2.45296 277.622-0.438271 295.232 2.08344 311.863 5.11504 327.379 8.59396 341.77